name: Biome

on:
  pull_request:
    branches: [ main ]

jobs:
  biome:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'react/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run Biome CI
        run: npx biome ci .
