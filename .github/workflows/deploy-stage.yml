name: Deploy Staging

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write  # Required for GitHub OIDC

jobs:
  deploy-stage:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/cell-kn-github-actions
          aws-region: us-east-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy backend (build, push, update ECS)
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: ./scripts/app/deploy-backend.sh stage

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'react/package-lock.json'

      - name: Deploy frontend (build, sync to S3, invalidate CloudFront)
        run: ./scripts/app/deploy-frontend.sh stage
