name: Promote to NIH-NLM upstream

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  open-upstream-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Open or update PR to upstream
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN }}
        run: |
          set -euo pipefail

          # Use the pulls API directly. `gh pr list --head Springbok-LLC:main`
          # silently returns empty when run against a different upstream repo,
          # which previously made the script try to create a duplicate PR and
          # fail with HTTP 422.
          EXISTING=$(gh api -X GET repos/NIH-NLM/nlm-ckn-ui/pulls \
            -F head=Springbok-LLC:main \
            -F base=main \
            -F state=open \
            --jq '.[0].number // empty')

          if [ -z "$EXISTING" ]; then
            echo "No open PR found - creating one."
            PR_NUM=$(gh api repos/NIH-NLM/nlm-ckn-ui/pulls \
              -f title="Promote Springbok-LLC main to upstream" \
              -f head="Springbok-LLC:main" \
              -f base="main" \
              -f body="Automated promotion from Springbok-LLC fork. Merged with admin bypass — Springbok-LLC's CI gates the commits before they land here." \
              --jq '.number')
            echo "Created: #$PR_NUM"
          else
            PR_NUM=$EXISTING
            echo "PR already open: #$PR_NUM"
          fi

          # Admin-bypass merge. The upstream Ruleset requires 1 approval which
          # auto-merge would wait on indefinitely; the head commits have already
          # passed Springbok-LLC's required checks (that's how they reached
          # main), so the upstream PR doesn't need separate gating here.
          # UPSTREAM_PR_TOKEN must belong to a user in the ruleset's bypass list.
          for i in 1 2 3 4 5; do
            if gh pr merge --admin --squash --repo NIH-NLM/nlm-ckn-ui "$PR_NUM"; then
              echo "Merged."
              exit 0
            fi
            echo "Merge attempt $i failed; sleeping $((i * 10))s before retry."
            sleep $((i * 10))
          done

          echo "::error::Failed to merge after 5 attempts."
          exit 1
