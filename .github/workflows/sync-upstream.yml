name: Sync to upstream

on:
  push:
    branches: [main]

jobs:
  sync:
    # Only run on the fork, not on the upstream repo
    if: github.repository == 'Springbok-LLC/nlm-ckn-ui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and merge upstream PR
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PAT }}
        run: |
          # Check if there's already an open sync PR
          EXISTING_PR=$(gh pr list \
            --repo NIH-NLM/nlm-ckn-ui \
            --head Springbok-LLC:main \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          COMMIT_MSG=$(git log -1 --pretty=%s)

          if [ -n "$EXISTING_PR" ]; then
            echo "Existing PR #${EXISTING_PR} found — it will update automatically from the branch."
          else
            echo "Creating new upstream PR..."
            PR_URL=$(gh pr create \
              --repo NIH-NLM/nlm-ckn-ui \
              --head Springbok-LLC:main \
              --base main \
              --title "$COMMIT_MSG" \
              --body "$(cat <<'EOF'
          Auto-synced from [Springbok-LLC/nlm-ckn-ui](https://github.com/Springbok-LLC/nlm-ckn-ui).

          This PR was reviewed by CodeRabbit and passed CI on the fork before merge.
          EOF
              )")
            echo "Created: $PR_URL"
            EXISTING_PR=$(echo "$PR_URL" | grep -o '[0-9]*$')
          fi

          # Wait for upstream CI to start
          echo "Waiting for CI to start..."
          sleep 30

          # Enable auto-merge (squash) — merges once required checks pass
          gh pr merge "$EXISTING_PR" \
            --repo NIH-NLM/nlm-ckn-ui \
            --squash \
            --auto \
            --delete-branch=false
          echo "Auto-merge enabled for PR #${EXISTING_PR}"
