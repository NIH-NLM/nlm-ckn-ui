name: Deploy ETL Dataset

on:
  push:
    branches: [main]
    paths:
      - 'ETL_VERSION'
  workflow_dispatch:
    # Uncomment the inputs block below when sandbox/prod environments are ready.
    # inputs:
    #   environment:
    #     description: 'Target environment'
    #     required: true
    #     default: dev
    #     type: choice
    #     options:
    #       - dev
    #       # - sandbox
    #       # - prod

# Prevent simultaneous deploys to the same environment.
# cancel-in-progress: false ensures a running restore is never interrupted
# mid-swap; the newer run queues and starts after the current one finishes.
concurrency:
  group: deploy-dataset
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy-dataset:
    runs-on: ubuntu-latest
    timeout-minutes: 110  # matches the 90-min SSM timeout plus overhead
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          # Role created by cloudformation/bootstrap/bootstrap.yaml
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/cell-kn-github-actions
          aws-region: us-east-1

      - name: Deploy dataset to dev
        run: ./scripts/app/deploy-dataset.sh dev
      # Uncomment below (and comment out the step above) once sandbox/prod are deployed.
      # - name: Deploy dataset
      #   run: ./scripts/app/deploy-dataset.sh ${{ inputs.environment || 'dev' }}
