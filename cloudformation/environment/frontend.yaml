AWSTemplateFormatVersion: '2010-09-09'
Description: 'Frontend S3 bucket, CloudFront distribution, and ACM certificate'

Parameters:
  ProjectName:
    Type: String
    Default: cell-kn
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: dev
    Description: Environment name (dev, sandbox, prod)
    AllowedValues:
      - dev
      - sandbox
      - prod

  DomainName:
    Type: String
    Description: Base domain name (e.g., cell-kn-mvp.org)

  HostedZoneId:
    Type: String
    Description: Route 53 hosted zone ID

  AlbDnsName:
    Type: String
    Description: ALB DNS name for backend origin

  CloudFrontSecret:
    Type: String
    NoEcho: true
    Description: >
      Secret header value used to verify CloudFront → ALB requests.
      Generated by the secrets stack and passed in from main.yaml.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project Configuration
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: Domain Configuration
        Parameters:
          - DomainName
          - HostedZoneId
          - AlbDnsName
      - Label:
          default: Secrets (generated by secrets stack)
        Parameters:
          - CloudFrontSecret

Conditions:
  IsProd: !Equals [!Ref Environment, 'prod']

Resources:
  # ============================================================================
  # S3 Bucket for Frontend
  # ============================================================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${ProjectName}-${Environment}-frontend'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-frontend'
        - Key: ManagedBy
          Value: CloudFormation

  # S3 Bucket Policy for CloudFront OAC
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # ============================================================================
  # ACM Certificate (us-east-1 for CloudFront)
  # ============================================================================
  # IMPORTANT: This stack MUST be deployed in us-east-1 for CloudFront ACM cert compatibility.
  # CloudFront requires ACM certificates to be in us-east-1.
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !If
        - IsProd
        - !Ref DomainName
        - !Sub '${Environment}.${DomainName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !If
            - IsProd
            - !Ref DomainName
            - !Sub '${Environment}.${DomainName}'
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-cert'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # CloudFront Origin Access Control
  # ============================================================================
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${ProjectName}-${Environment}-oac'
        Description: !Sub 'OAC for ${ProjectName} ${Environment} frontend'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ============================================================================
  # CloudFront Distribution
  # ============================================================================
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Comment: !Sub '${ProjectName} ${Environment} frontend'
        Aliases:
          - !If
              - IsProd
              - !Ref DomainName
              - !Sub '${Environment}.${DomainName}'

        # Default origin (S3 - frontend)
        DefaultRootObject: index.html
        Origins:
          # S3 Origin for frontend
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig: {}

          # ALB Origin for backend API (port 8000)
          - Id: ALBOrigin
            DomainName: !Ref AlbDnsName
            CustomOriginConfig:
              HTTPPort: 8000
              OriginProtocolPolicy: http-only
              OriginSSLProtocols:
                - TLSv1.2
            OriginCustomHeaders:
              - HeaderName: X-Custom-Origin-Header
                HeaderValue: !Ref CloudFrontSecret

          # ALB Origin for ArangoDB web UI (port 8529)
          - Id: ArangoDbOrigin
            DomainName: !Ref AlbDnsName
            CustomOriginConfig:
              HTTPPort: 8529
              OriginProtocolPolicy: http-only
              OriginSSLProtocols:
                - TLSv1.2
            OriginCustomHeaders:
              - HeaderName: X-Custom-Origin-Header
                HeaderValue: !Ref CloudFrontSecret

        # Default behavior (S3)
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized

        # Cache behaviors (evaluated in order; most specific paths first)
        CacheBehaviors:
          # Backend API
          - PathPattern: /arango_api/*
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # Managed-CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # Managed-AllViewer

          # ArangoDB web UI and REST API paths
          - PathPattern: /_db/*
            TargetOriginId: ArangoDbOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # Managed-CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # Managed-AllViewer

          - PathPattern: /_api/*
            TargetOriginId: ArangoDbOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # Managed-CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # Managed-AllViewer

          - PathPattern: /_admin/*
            TargetOriginId: ArangoDbOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # Managed-CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # Managed-AllViewer

        # Custom error responses
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

        # SSL/TLS certificate
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

        # Price class
        PriceClass: PriceClass_100

      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-cloudfront'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # Route 53 Record
  # ============================================================================
  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If
        - IsProd
        - !Ref DomainName
        - !Sub '${Environment}.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID (constant)
        EvaluateTargetHealth: false

Outputs:
  BucketName:
    Description: S3 bucket name for frontend
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub '${ProjectName}-${Environment}-frontend-bucket'

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${ProjectName}-${Environment}-cloudfront-id'

  CloudFrontDomainName:
    Description: CloudFront domain name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-cloudfront-domain'

  FrontendUrl:
    Description: Frontend URL
    Value: !Sub
      - 'https://${Domain}'
      - Domain: !If
          - IsProd
          - !Ref DomainName
          - !Sub '${Environment}.${DomainName}'
    Export:
      Name: !Sub '${ProjectName}-${Environment}-frontend-url'
