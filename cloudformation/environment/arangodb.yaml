AWSTemplateFormatVersion: '2010-09-09'
Description: 'ArangoDB on EC2 with EBS persistence and S3 restore capability'

Parameters:
  ProjectName:
    Type: String
    Default: cell-kn
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: dev
    Description: Environment name (dev, stage, sandbox, prod)
    AllowedValues:
      - dev
      - stage
      - sandbox
      - prod

  # Security group ID cannot use Fn::ImportValue inside Fn::If, so it is
  # passed as a parameter. deploy-environment.sh resolves it from either the
  # infra stack exports (dev) or SSM prereqs (sandbox/prod).
  ArangoDbSecurityGroupId:
    Type: String
    Description: Security group ID for ArangoDB EC2 instance

  ArangoDbUser:
    Type: String
    Default: root
    Description: ArangoDB root username

  # EBS volume size in GB for ArangoDB data.
  EbsVolumeSize:
    Type: Number
    Default: 50
    MinValue: 20
    MaxValue: 500
    Description: EBS volume size (GB) for ArangoDB data

  # IAM instance profile ARN - empty in dev/stage (created by this template).
  # In sandbox/prod this must be a pre-created ARN passed in from deploy script.
  InstanceProfileArn:
    Type: String
    Default: ''
    Description: >
      Pre-existing IAM instance profile ARN (sandbox/prod only).
      Leave empty in dev/stage˙ - the profile will be created by this template.

  # Subnet for the ArangoDB EC2 instance.
  # In dev, defaults to the existing dev subnet. In stage, the deploy script
  # passes the first private subnet from the infra stack exports.
  ArangoDbSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: >
      Subnet ID for the ArangoDB EC2 instance.
      Must be supplied by deploy-environment.sh (resolved from infra stack exports).

  # Availability Zone for the standalone data volume. A standalone AWS::EC2::Volume
  # requires an explicit AZ, and it must match the AZ of ArangoDbSubnetId (an EBS
  # volume can only attach to an instance in the same AZ). We cannot Fn::GetAtt the
  # AZ of a subnet passed as a parameter, so deploy-environment.sh resolves it from
  # the subnet (aws ec2 describe-subnets) and passes it here.
  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: >
      Availability Zone for the ArangoDB data volume.
      Must match the AZ of ArangoDbSubnetId. Resolved by deploy-environment.sh.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project Configuration
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: Network Configuration
        Parameters:
          - ArangoDbSecurityGroupId
          - ArangoDbSubnetId
          - AvailabilityZone
      - Label:
          default: ArangoDB Configuration
        Parameters:
          - ArangoDbUser
      - Label:
          default: EC2 / Storage Configuration
        Parameters:
          - EbsVolumeSize
      - Label:
          default: Pre-existing IAM (sandbox/prod only - leave empty in dev/stage)
        Parameters:
          - InstanceProfileArn

Mappings:
  # ArangoDB EC2 instance size per environment. ArangoDB is memory-bound: the
  # working set plus ArangoSearch views should fit in cache, otherwise queries
  # constantly read from EBS (observed on stage at t4g.medium, and as a
  # multi-second cold window after every restart — 2026-06-15 postmortem).
  #
  # Cache sizes are NOT pinned here; the UserData derives them from the host's
  # actual RAM (see the "cache budget" block in UserData) so they scale with the
  # instance type automatically (4 / 8 / 16 GiB across t4g.medium / m7g.large /
  # m7g.xlarge).
  EnvironmentSizing:
    dev:
      InstanceType: t4g.medium
    stage:
      InstanceType: m7g.large
    sandbox:
      InstanceType: m7g.large
    prod:
      InstanceType: m7g.xlarge

Conditions:
  # dev + stage own their full stack; sandbox/prod use NIH-pre-created IAM
  IsSelfManaged: !Or
    - !Equals [!Ref Environment, 'dev']
    - !Equals [!Ref Environment, 'stage']

Resources:
  # ============================================================================
  # SSM Parameters for ArangoDB Credentials
  # ============================================================================
  ArangoDbUserParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/arango/db-user'
      Type: String
      Value: !Ref ArangoDbUser
      Description: ArangoDB username
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Name: !Sub '${ProjectName}-${Environment}-arango-user'
        ManagedBy: CloudFormation

  # Dataset version parameter - managed out-of-band by deploy-dataset.sh.
  # Always set to 'none' here so CloudFormation never overwrites a live value
  # on subsequent stack updates, preventing unintended dataset restores.
  DatasetVersionParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/arango/dataset-version'
      Type: String
      Value: 'none'
      Description: Current dataset version (S3 key) - updated by deploy-dataset.sh, not CloudFormation
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Name: !Sub '${ProjectName}-${Environment}-dataset-version'
        ManagedBy: CloudFormation

  # ============================================================================
  # CloudWatch Log Group
  # ============================================================================
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ec2/${ProjectName}-${Environment}-arangodb'
      RetentionInDays: 7

  # ============================================================================
  # IAM Role + Instance Profile (dev and stage)
  # In sandbox/prod these are pre-created and passed in as InstanceProfileArn.
  # ============================================================================
  InstanceRole:
    Type: AWS::IAM::Role
    Condition: IsSelfManaged
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-arangodb-ec2'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # SSM Session Manager access (replaces SSH)
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore'
        # CloudWatch agent
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/CloudWatchAgentServerPolicy'
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-arangodb-data-*'
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-arangodb-data-*/*'
        - PolicyName: SSMParameterAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/arango/*'
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/shared/arangodb-bucket-name'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/${ProjectName}/${Environment}/secrets/*'
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ec2/${ProjectName}-${Environment}-arangodb:*'
        - PolicyName: ServiceDiscoveryAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - servicediscovery:RegisterInstance
                  - servicediscovery:DeregisterInstance
                  - servicediscovery:GetOperation
                  # ListInstances + ec2:DescribeInstances (granted in the
                  # EbsDataVolumeAttach policy below) let the instance reconcile
                  # the Cloud Map service on boot: deregister any prior
                  # registration whose EC2 instance is no longer running, which
                  # is how a replaced instance leaves stale dead A-records behind.
                  - servicediscovery:ListInstances
                Resource: '*'
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:CreateHealthCheck
                  - route53:DeleteHealthCheck
                  - route53:UpdateHealthCheck
                Resource: '*'
        - PolicyName: AlbTargetRegistration
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:DeregisterTargets
                  - elasticloadbalancing:DescribeTargetGroups
                  - cloudformation:ListExports
                Resource: '*'
        # The instance attaches its own standalone data volume from UserData
        # rather than via a CloudFormation AWS::EC2::VolumeAttachment, which would
        # deadlock against this instance's CreationPolicy. Describe is account-wide
        # (the API has no resource-level filter); attach/detach are scoped to the
        # arangodb data volumes by the Environment tag.
        - PolicyName: EbsDataVolumeAttach
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeVolumes
                  # DescribeInstances backs the Cloud Map reconcile (step 7 in
                  # UserData / the shutdown hook): it checks each registered
                  # instance's state before deregistering dead ones. The API has
                  # no resource-level filter, so it is account-wide like Describe.
                  - ec2:DescribeInstances
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:AttachVolume
                  - ec2:DetachVolume
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/*'
                  - !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:volume/*'
                Condition:
                  StringEquals:
                    'aws:ResourceTag/Project': !Ref ProjectName
                    'aws:ResourceTag/Environment': !Ref Environment
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-arangodb-ec2-role'
        - Key: ManagedBy
          Value: CloudFormation

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Condition: IsSelfManaged
    Properties:
      InstanceProfileName: !Sub '${ProjectName}-${Environment}-arangodb-ec2'
      Roles:
        - !Ref InstanceRole

  # ============================================================================
  # Cloud Map Service for Service Discovery
  # EC2 instance self-registers via UserData using the AWS CLI.
  # ============================================================================
  ServiceDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: arangodb
      DnsConfig:
        NamespaceId: !ImportValue
          Fn::Sub: '${ProjectName}-${Environment}-namespace-id'
        DnsRecords:
          - Type: A
            TTL: 60
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ============================================================================
  # ArangoDB Data Volume (standalone, retained)
  #
  # Defined as a standalone AWS::EC2::Volume (NOT inline in the instance's
  # BlockDeviceMappings) so it is NOT replaced when the EC2 instance is replaced.
  # An InstanceType resize forces instance replacement; with the volume inline,
  # CloudFormation would provision a brand-new EMPTY data volume and ArangoDB
  # would come up blank. As a standalone resource with Retain policies, the SAME
  # volume detaches from the old instance and re-attaches to the new one.
  #
  # DeletionPolicy/UpdateReplacePolicy Retain guard against accidental data loss
  # if the resource is ever deleted or replaced.
  # ============================================================================
  DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Ref AvailabilityZone
      Size: !Ref EbsVolumeSize
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-arangodb-data'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # EC2 Instance
  #
  # Uses the latest Amazon Linux 2023 AMI (resolved at deploy time via SSM).
  # EBS volume for data is attached separately and mounted to /var/lib/arangodb3
  # so it survives instance replacement.
  #
  # UserData performs:
  #   1. Install Docker + CloudWatch agent
  #   2. Format + mount EBS data volume (skipped if already formatted)
  #   3. Run ArangoDB via Docker
  #   4. Restore dataset via arangorestore (if SSM dataset-version is set)
  #   5. Register with Cloud Map service discovery
  #   6. Register with ALB target group
  # ============================================================================
  ArangoDbInstance:
    Type: AWS::EC2::Instance
    DependsOn:
      - ArangoDbUserParameter
      - DatasetVersionParameter
      - LogGroup
      - ServiceDiscoveryService
    CreationPolicy:
      ResourceSignal:
        Timeout: PT20M
    Properties:
      # arm64 AMI — matches t4g (Graviton2) instance family.
      # If switching back to t3/x86, change to: al2023-ami-kernel-default-x86_64
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64}}'
      InstanceType: !FindInMap [EnvironmentSizing, !Ref Environment, InstanceType]
      SubnetId: !Ref ArangoDbSubnetId
      SecurityGroupIds:
        - !Ref ArangoDbSecurityGroupId
      IamInstanceProfile: !If
        - IsSelfManaged
        - !Ref InstanceProfile
        - !Ref InstanceProfileArn
      BlockDeviceMappings:
        # Root volume — OS only. The ArangoDB data volume is a standalone
        # AWS::EC2::Volume (see DataVolume; attached by UserData) so it
        # survives instance replacement (e.g. an InstanceType resize).
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          PROJECT_NAME="${ProjectName}"
          ENVIRONMENT="${Environment}"
          REGION="${AWS::Region}"
          ACCOUNT_ID="${AWS::AccountId}"
          LOG_GROUP="/ec2/${ProjectName}-${Environment}-arangodb"
          SD_SERVICE_ID="${ServiceDiscoveryService}"

          # ── 1. System setup ──────────────────────────────────────────────────
          yum update -y
          yum install -y docker aws-cli

          # CloudWatch agent
          yum install -y amazon-cloudwatch-agent
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json << 'CWAGENT'
          {
            "metrics": {
              "namespace": "CWAgent",
              "append_dimensions": {
                "InstanceId": "${!aws:InstanceId}"
              },
              "metrics_collected": {
                "mem": {
                  "measurement": [
                    "mem_used_percent"
                  ],
                  "metrics_collection_interval": 60
                }
              }
            },
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/arangodb-setup.log",
                      "log_group_name": "${LogGroup}",
                      "log_stream_name": "setup/{instance_id}",
                      "timestamp_format": "%Y-%m-%dT%H:%M:%S"
                    },
                    {
                      "file_path": "/var/log/arangodb-docker.log",
                      "log_group_name": "${LogGroup}",
                      "log_stream_name": "arangodb/{instance_id}",
                      "timestamp_format": "%Y-%m-%dT%H:%M:%S"
                    }
                  ]
                }
              }
            }
          }
          CWAGENT
          systemctl enable amazon-cloudwatch-agent
          systemctl start amazon-cloudwatch-agent

          exec > >(tee /var/log/arangodb-setup.log | logger -t arangodb-setup) 2>&1
          echo "==> Starting ArangoDB setup $(date)"

          # ── 2. Mount EBS data volume ─────────────────────────────────────────
          # The data volume is a standalone, RETAINED EBS volume attached as
          # /dev/sdf by the self-attach block above (see DataVolume). It
          # persists across instance replacement, so on every boot after the very
          # first it ALREADY contains an XFS filesystem + ArangoDB data. We must
          # mount it WITHOUT reformatting — a stray mkfs here would wipe the DB.
          DATA_DIR=/var/lib/arangodb3
          APPS_DIR=/var/lib/arangodb3-apps

          mkdir -p "$DATA_DIR" "$APPS_DIR"

          # Resolve the data device by elimination. On Nitro/Graviton the volume
          # may present as NVMe (/dev/nvme1n1) regardless of the /dev/sdf request,
          # so we don't hard-code a name. The root disk is whatever backs "/";
          # the data volume is the other whole disk. The attachment can lag the
          # instance boot, so we poll for it.
          ROOT_DISK=$(lsblk -no pkname "$(findmnt -no SOURCE /)")
          echo "==> Root disk: $ROOT_DISK"

          # Attach the standalone data volume to THIS instance from UserData.
          # We can't use a CloudFormation AWS::EC2::VolumeAttachment: it depends on
          # the instance reaching CREATE_COMPLETE, but our CreationPolicy only
          # signals success after the volume is mounted -> deadlock. Doing the
          # attach here also lets us force-detach the volume from a prior instance
          # during an in-place replacement (e.g. an InstanceType resize), which a
          # static VolumeAttachment can't coordinate within the same stack update.
          DATA_VOLUME_ID="${DataVolume}"
          IMDS_TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" \
            -H "X-aws-ec2-metadata-token-ttl-seconds: 300")
          SELF_INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" \
            http://169.254.169.254/latest/meta-data/instance-id)
          echo "==> Ensuring data volume $DATA_VOLUME_ID is attached to $SELF_INSTANCE_ID..."
          for i in $(seq 1 30); do
            VOL_STATE=$(aws ec2 describe-volumes --volume-ids "$DATA_VOLUME_ID" \
              --query 'Volumes[0].State' --output text --region "$REGION" 2>/dev/null || echo unknown)
            ATTACHED_TO=$(aws ec2 describe-volumes --volume-ids "$DATA_VOLUME_ID" \
              --query 'Volumes[0].Attachments[0].InstanceId' --output text --region "$REGION" 2>/dev/null || echo None)
            if [ "$ATTACHED_TO" = "$SELF_INSTANCE_ID" ]; then
              echo "==> Volume attached to this instance (state=$VOL_STATE)"
              break
            elif [ "$VOL_STATE" = "available" ]; then
              echo "==> Volume available; issuing attach..."
              aws ec2 attach-volume --volume-id "$DATA_VOLUME_ID" \
                --instance-id "$SELF_INSTANCE_ID" --device /dev/sdf --region "$REGION" || true
            elif [ "$ATTACHED_TO" != "None" ] && [ -n "$ATTACHED_TO" ]; then
              echo "==> Volume still attached to prior instance $ATTACHED_TO; force-detaching..."
              aws ec2 detach-volume --volume-id "$DATA_VOLUME_ID" --force --region "$REGION" || true
            fi
            echo "  waiting for attach... attempt $i/30 (state=$VOL_STATE attached_to=$ATTACHED_TO)"
            sleep 10
          done

          echo "==> Waiting for data volume to surface as a block device..."
          DATA_DEVICE=""
          for i in $(seq 1 30); do
            # `|| true`: until the volume attaches, grep -v matches nothing and
            # exits 1, which under `set -e -o pipefail` would abort the script
            # before this poll loop can retry. Tolerate it and keep polling.
            DATA_DEVICE=$(lsblk -dpno NAME | grep -v "^/dev/${!ROOT_DISK}$" | head -1 || true)
            if [ -n "$DATA_DEVICE" ]; then
              echo "==> Data device found: $DATA_DEVICE (attempt $i)"
              break
            fi
            echo "  waiting for data volume... attempt $i/30"
            sleep 5
          done

          if [ -z "$DATA_DEVICE" ]; then
            echo "ERROR: data volume never appeared as a block device"
            /opt/aws/bin/cfn-signal -e 1 \
              --stack "${AWS::StackName}" \
              --resource ArangoDbInstance \
              --region "${AWS::Region}"
            exit 1
          fi

          # Only format if the device has NO filesystem yet. blkid prints a TYPE=
          # field only when a filesystem (or other signature) is present, so this
          # guard ensures a populated volume from a prior instance is never wiped.
          if blkid "$DATA_DEVICE" | grep -q 'TYPE='; then
            echo "==> Data volume already has a filesystem, skipping mkfs (preserving data)"
          else
            echo "==> Data volume is blank (first boot), formatting with XFS..."
            mkfs.xfs "$DATA_DEVICE"
          fi

          # Mount by filesystem UUID (stable across reboots / device renaming),
          # idempotent via fstab.
          DATA_UUID=$(blkid -s UUID -o value "$DATA_DEVICE")
          if ! grep -q "$DATA_UUID" /etc/fstab; then
            echo "UUID=$DATA_UUID $DATA_DIR xfs defaults,nofail 0 2" >> /etc/fstab
          fi
          mount -a
          echo "==> Data volume ($DATA_DEVICE, UUID=$DATA_UUID) mounted at $DATA_DIR"

          # Set ownership to ArangoDB uid/gid (1000:1000 in official Docker image)
          chown -R 1000:1000 "$DATA_DIR" "$APPS_DIR"

          # ── 3. Run ArangoDB via Docker ───────────────────────────────────────
          # ArangoDB must be running before arangorestore can connect to it,
          # so we start the container here (before the restore step).
          systemctl enable docker
          systemctl start docker

          ARANGO_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id "/$PROJECT_NAME/$ENVIRONMENT/secrets/arangodb-password" \
            --query 'SecretString' \
            --output text \
            --region "$REGION")

          # IMDSv2 token (AL2023 requires token-based metadata access)
          IMDS_TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" \
            -H "X-aws-ec2-metadata-token-ttl-seconds: 300")
          INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" \
            http://169.254.169.254/latest/meta-data/instance-id)

          # ── Cache budget (derived from this host's actual RAM) ───────────────
          # ArangoDB was running starved: column cache DISABLED
          # (arangodb_search_columns_cache_size = 0), ~512 MiB RocksDB block cache
          # and ~256 MiB in-RAM cache — so most of the working set lived on EBS
          # and every restart paid a 2–4.5 s cold-cache window (2026-06-15
          # postmortem, Springbok-LLC/upptime#2). We size the caches from real RAM
          # so they scale with the instance type (t4g.medium 4 / m7g.large 8 /
          # m7g.xlarge 16 GiB) without per-env constants.
          #
          # MEM_TOTAL_MIB = physical RAM. We hand ArangoDB ~75% of it via
          # ARANGODB_OVERRIDE_DETECTED_TOTAL_MEMORY (leaving ~25%, min 2 GiB, for
          # the OS + Docker + ArangoSearch query/working memory), then pin the two
          # big caches explicitly (an explicit value overrides ArangoDB's
          # memory-derived default):
          #   --rocksdb.block-cache-size      ≈ 25% of host RAM
          #   --arangosearch.columns-cache-limit ≈ 12.5% of host RAM (0 = off was the bug)
          # The in-RAM hash/edge cache (--cache.size) is left at its default,
          # which ArangoDB derives from the override (~(override-2GiB)*0.25).
          MEM_TOTAL_MIB=$(free -m | awk '/^Mem:/{print $2}')
          OS_RESERVE_MIB=$(( MEM_TOTAL_MIB / 4 ))
          [ "$OS_RESERVE_MIB" -lt 2048 ] && OS_RESERVE_MIB=2048
          ARANGO_MEM_MIB=$(( MEM_TOTAL_MIB - OS_RESERVE_MIB ))
          BLOCK_CACHE_BYTES=$(( MEM_TOTAL_MIB / 4 * 1024 * 1024 ))
          COLUMNS_CACHE_BYTES=$(( MEM_TOTAL_MIB / 8 * 1024 * 1024 ))
          echo "==> Cache budget: host=${!MEM_TOTAL_MIB}MiB arango_override=${!ARANGO_MEM_MIB}MiB" \
               "block_cache=${!BLOCK_CACHE_BYTES}B columns_cache=${!COLUMNS_CACHE_BYTES}B"

          docker run -d \
            --name arangodb \
            --restart unless-stopped \
            -p 8529:8529 \
            -e ARANGO_ROOT_PASSWORD="$ARANGO_PASSWORD" \
            -e ARANGODB_OVERRIDE_DETECTED_TOTAL_MEMORY="${!ARANGO_MEM_MIB}MiB" \
            -v "$DATA_DIR:/var/lib/arangodb3" \
            -v "$APPS_DIR:/var/lib/arangodb3-apps" \
            --log-driver awslogs \
            --log-opt awslogs-region="$REGION" \
            --log-opt awslogs-group="$LOG_GROUP" \
            --log-opt awslogs-stream="arangodb/$INSTANCE_ID" \
            arangodb:3.12 \
            --rocksdb.block-cache-size "$BLOCK_CACHE_BYTES" \
            --arangosearch.columns-cache-limit "$COLUMNS_CACHE_BYTES"

          # ArangoDB first-boot initialisation (password setup, key generation) can
          # take several minutes. Poll for up to 10 minutes before giving up.
          # /_admin/server/availability returns 200 without authentication.
          echo "==> Waiting for ArangoDB to be ready (up to 10 min)..."
          READY=0
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8529/_admin/server/availability > /dev/null 2>&1; then
              echo "==> ArangoDB is ready after $i attempts"
              READY=1
              break
            fi
            echo "  attempt $i/60..."
            sleep 10
          done

          if [ "$READY" = "0" ]; then
            echo "ERROR: ArangoDB did not become ready in time"
            docker logs arangodb --tail 50 || true
            /opt/aws/bin/cfn-signal -e 1 \
              --stack "${AWS::StackName}" \
              --resource ArangoDbInstance \
              --region "${AWS::Region}"
            exit 1
          fi

          # ── 4. Restore dataset via arangorestore ─────────────────────────────
          # On first boot (or after instance replacement) we restore the dataset
          # version recorded in SSM. No blue-green swap is needed here because
          # ArangoDB just initialised with an empty database.
          echo "==> Dataset restore check"

          ARANGODB_S3_BUCKET=$(aws ssm get-parameter \
            --name "/$PROJECT_NAME/shared/arangodb-bucket-name" \
            --query 'Parameter.Value' \
            --output text \
            --region "$REGION")

          CURRENT_VERSION=$(aws ssm get-parameter \
            --name "/$PROJECT_NAME/$ENVIRONMENT/arango/dataset-version" \
            --query 'Parameter.Value' \
            --output text \
            --region "$REGION")

          echo "Dataset bucket:  $ARANGODB_S3_BUCKET"
          echo "Dataset version: $CURRENT_VERSION"

          # On a retained volume that already holds this dataset version (e.g. after
          # an instance replacement), skip the restore so we don't clobber the live
          # data — the volume already carries it.
          RESTORED_MARKER=""
          [ -f "$DATA_DIR/.dataset-version" ] && RESTORED_MARKER=$(cat "$DATA_DIR/.dataset-version")

          if [ "$CURRENT_VERSION" = "none" ] || [ -z "$CURRENT_VERSION" ]; then
            echo "No dataset version configured, skipping restore"
          elif [ "$CURRENT_VERSION" = "$RESTORED_MARKER" ]; then
            echo "Dataset version $CURRENT_VERSION already present on volume, skipping restore"
          else
            echo "==> Downloading s3://$ARANGODB_S3_BUCKET/$CURRENT_VERSION"
            aws s3 cp "s3://$ARANGODB_S3_BUCKET/$CURRENT_VERSION" /tmp/restore.tar.gz

            DUMP_EXTRACT_DIR=/tmp/arango-dump
            rm -rf "$DUMP_EXTRACT_DIR"
            mkdir -p "$DUMP_EXTRACT_DIR"
            tar -xzf /tmp/restore.tar.gz -C "$DUMP_EXTRACT_DIR"
            rm -f /tmp/restore.tar.gz

            # Strip a single wrapper directory if present so arangorestore
            # receives the correct --input-directory in both archive layouts.
            TOP_LEVEL=$(ls -1 "$DUMP_EXTRACT_DIR" | head -1)
            if [ -n "$TOP_LEVEL" ] && [ -d "$DUMP_EXTRACT_DIR/$TOP_LEVEL" ] && \
               [ "$(ls -1 "$DUMP_EXTRACT_DIR" | wc -l)" = "1" ]; then
              DUMP_DIR="$DUMP_EXTRACT_DIR/$TOP_LEVEL"
            else
              DUMP_DIR="$DUMP_EXTRACT_DIR"
            fi
            echo "==> Dump root: $DUMP_DIR"

            # Detect multi-database dump (no MANIFEST.json at top level)
            if [ -f "$DUMP_DIR/MANIFEST.json" ]; then
              RESTORE_FLAGS=""
            else
              RESTORE_FLAGS="--all-databases true"
            fi

            echo "==> Running arangorestore..."
            # shellcheck disable=SC2086  # word-split on RESTORE_FLAGS is intentional
            docker run --rm \
              --network host \
              -v "$DUMP_DIR:/dump" \
              arangodb:3.12 \
              arangorestore \
              --server.endpoint tcp://127.0.0.1:8529 \
              --server.password "$ARANGO_PASSWORD" \
              --create-database true \
              --overwrite true \
              --include-system-collections false \
              --input-directory /dump \
              $RESTORE_FLAGS

            echo "$CURRENT_VERSION" > "$DATA_DIR/.dataset-version"
            rm -rf "$DUMP_EXTRACT_DIR"
            echo "==> Dataset restore complete"
          fi

          # ── 5. Register with Cloud Map ────────────────────────────────────────
          PRIVATE_IP=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" \
            http://169.254.169.254/latest/meta-data/local-ipv4)

          echo "==> Registering with Cloud Map (service: $SD_SERVICE_ID, ip: $PRIVATE_IP)"
          aws servicediscovery register-instance \
            --service-id "$SD_SERVICE_ID" \
            --instance-id "$INSTANCE_ID" \
            --attributes "AWS_INSTANCE_IPV4=$PRIVATE_IP,AWS_INSTANCE_PORT=8529" \
            --region "$REGION"

          # ── 6. Register with ALB target group ────────────────────────────────
          TG_ARN=$(aws cloudformation list-exports \
            --region "$REGION" \
            --query "Exports[?Name=='${ProjectName}-${Environment}-arangodb-tg-arn'].Value" \
            --output text)

          echo "==> Registering with ALB target group ($TG_ARN)"
          aws elbv2 register-targets \
            --target-group-arn "$TG_ARN" \
            --targets "Id=$INSTANCE_ID,Port=8529" \
            --region "$REGION"

          # ── 7. Reconcile Cloud Map: drop stale (dead) registrations ──────────
          # When this instance replaced a prior one (e.g. an InstanceType resize),
          # the OLD instance's Cloud Map registration is NOT removed — nothing runs
          # on a terminated host to deregister it. The service then accumulates dead
          # A-records and the Django backend (which resolves arangodb via Cloud Map
          # DNS, not the ALB) round-robins onto dead IPs and hangs until timeout
          # (3.5s, or 30s -> CloudFront 504). See the 2026-06-15 stage postmortem.
          #
          # We self-heal on every boot: list the service's registered instances and
          # deregister any whose EC2 instance is not 'running' (terminated, stopped,
          # or already gone). Our own freshly-registered id is always running, so it
          # is preserved. This makes replacement self-correcting without an ASG
          # lifecycle hook, which this single CloudFormation-managed instance has not.
          echo "==> Reconciling Cloud Map service $SD_SERVICE_ID (removing dead registrations)"
          REGISTERED_IDS=$(aws servicediscovery list-instances \
            --service-id "$SD_SERVICE_ID" \
            --query 'Instances[].Id' \
            --output text \
            --region "$REGION" 2>/dev/null || echo "")
          for RID in $REGISTERED_IDS; do
            if [ "$RID" = "$INSTANCE_ID" ]; then
              continue
            fi
            # Registered Cloud Map instance ids are EC2 instance ids (we register
            # with --instance-id "$INSTANCE_ID"). A missing/terminated instance
            # yields an empty/"None"/error state, which we also treat as stale.
            RID_STATE=$(aws ec2 describe-instances \
              --instance-ids "$RID" \
              --query 'Reservations[0].Instances[0].State.Name' \
              --output text \
              --region "$REGION" 2>/dev/null || echo "missing")
            if [ "$RID_STATE" != "running" ]; then
              echo "  deregistering stale Cloud Map instance $RID (ec2 state: $RID_STATE)"
              aws servicediscovery deregister-instance \
                --service-id "$SD_SERVICE_ID" \
                --instance-id "$RID" \
                --region "$REGION" || true
            else
              echo "  keeping $RID (ec2 state: running)"
            fi
          done

          # ── 8. Install a shutdown hook to deregister this instance ────────────
          # Belt-and-suspenders to the boot-time reconcile above: on a *graceful*
          # stop/terminate (which CloudFormation issues when replacing the
          # instance), systemd runs this oneshot's ExecStop, removing our own
          # Cloud Map + ALB registration before we go away. The boot-time reconcile
          # still covers the hard-kill case where ExecStop never runs.
          # sed strips the YAML block-scalar indentation so the shebang lands at
          # byte 0 (required for execve) — the heredoc body has no intentional
          # leading whitespace, so this is safe.
          sed 's/^          //' > /usr/local/bin/arango-deregister.sh << 'DEREG'
          #!/bin/bash
          set -uo pipefail
          REGION="__REGION__"
          SD_SERVICE_ID="__SD_SERVICE_ID__"
          TG_ARN="__TG_ARN__"
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" \
            -H "X-aws-ec2-metadata-token-ttl-seconds: 60")
          IID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
            http://169.254.169.254/latest/meta-data/instance-id)
          [ -n "$IID" ] || exit 0
          echo "arango-deregister: removing $IID from Cloud Map $SD_SERVICE_ID"
          aws servicediscovery deregister-instance \
            --service-id "$SD_SERVICE_ID" --instance-id "$IID" --region "$REGION" || true
          if [ -n "$TG_ARN" ]; then
            aws elbv2 deregister-targets \
              --target-group-arn "$TG_ARN" \
              --targets "Id=$IID,Port=8529" --region "$REGION" || true
          fi
          DEREG
          sed -i \
            -e "s|__REGION__|$REGION|g" \
            -e "s|__SD_SERVICE_ID__|$SD_SERVICE_ID|g" \
            -e "s|__TG_ARN__|$TG_ARN|g" \
            /usr/local/bin/arango-deregister.sh
          chmod +x /usr/local/bin/arango-deregister.sh

          # Strip the block-scalar indentation: systemd requires section headers
          # like [Unit] at column 0 and rejects leading whitespace.
          sed 's/^          //' > /etc/systemd/system/arango-deregister.service << 'UNIT'
          [Unit]
          Description=Deregister ArangoDB instance from Cloud Map / ALB on shutdown
          # Run the deregister as part of normal shutdown.
          After=network-online.target
          Wants=network-online.target
          [Service]
          Type=oneshot
          RemainAfterExit=yes
          # ExecStart is a no-op marker; the real work happens on stop.
          ExecStart=/bin/true
          ExecStop=/usr/local/bin/arango-deregister.sh
          [Install]
          WantedBy=multi-user.target
          UNIT
          systemctl daemon-reload
          systemctl enable arango-deregister.service
          systemctl start arango-deregister.service

          echo "==> Setup complete $(date)"

          # Signal CloudFormation success
          /opt/aws/bin/cfn-signal -e 0 \
            --stack "${AWS::StackName}" \
            --resource ArangoDbInstance \
            --region "${AWS::Region}"

      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-arangodb'
        - Key: ManagedBy
          Value: CloudFormation

# NOTE: the standalone DataVolume is attached by the instance itself from
# UserData (see the "Attach the standalone data volume" block). We deliberately
# do NOT use an AWS::EC2::VolumeAttachment resource here: it would depend on the
# instance reaching CREATE_COMPLETE, but the instance's CreationPolicy only
# signals success after the volume is mounted -> a deadlock that times out and
# rolls back (the original UPDATE_FAILED). Self-attach from UserData also lets us
# force-detach the volume from a prior instance during an in-place replacement.

Outputs:
  InstanceId:
    Description: ArangoDB EC2 instance ID
    Value: !Ref ArangoDbInstance
    Export:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-instance-id'

  PrivateIp:
    Description: ArangoDB EC2 private IP
    Value: !GetAtt ArangoDbInstance.PrivateIp
    Export:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-private-ip'

  ServiceDiscoveryDnsName:
    Description: Service discovery DNS name
    Value: !Sub 'arangodb.${ProjectName}-${Environment}.local'
    Export:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-dns'

  DatasetVersionParameter:
    Description: SSM parameter name for dataset version
    Value: !Ref DatasetVersionParameter
    Export:
      Name: !Sub '${ProjectName}-${Environment}-dataset-version-param'
