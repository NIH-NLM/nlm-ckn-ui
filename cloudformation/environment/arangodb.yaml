AWSTemplateFormatVersion: '2010-09-09'
Description: 'ArangoDB ECS service with EFS persistence and S3 restore capability'

Parameters:
  ProjectName:
    Type: String
    Default: cell-kn
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: dev
    Description: Environment name (dev, sandbox, prod)
    AllowedValues:
      - dev
      - sandbox
      - prod

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnet IDs for ECS tasks (NIH-provided)

  ArangoDbSecurityGroupId:
    Type: String
    Description: Security group ID for ArangoDB ECS tasks

  EfsSecurityGroupId:
    Type: String
    Description: Security group ID for EFS mount targets

  EcsClusterName:
    Type: String
    Description: ECS cluster name

  ServiceDiscoveryNamespaceId:
    Type: String
    Description: Cloud Map namespace ID

  TargetGroupArn:
    Type: String
    Description: ALB target group ARN for ArangoDB

  ArangoDbS3BucketName:
    Type: String
    Description: S3 bucket name for datasets (from shared stack)

  ArangoDbUser:
    Type: String
    Default: root
    Description: ArangoDB root username

  ArangoDbPassword:
    Type: String
    NoEcho: true
    Description: >
      ArangoDB root password. Generated by the secrets stack and passed in
      from main.yaml.

  PrivateSubnetCount:
    Type: Number
    Default: 2
    AllowedValues: [1, 2]
    Description: Number of private subnets provided (determines EFS mount targets)

  # IAM role ARNs - empty string in dev (roles are created by this template).
  # In sandbox/prod these must be pre-created ARNs passed in from main.yaml,
  # which resolves them from SSM prereq parameters.
  TaskExecutionRoleArn:
    Type: String
    Default: ''
    AllowedPattern: '^(arn:(aws[a-zA-Z-]*)?:iam::\d{12}:role/[a-zA-Z_0-9+=,.@\-_/]+)?$'
    Description: >
      Pre-existing ECS task execution role ARN (sandbox/prod only).
      Leave empty in dev - the role will be created by this template.

  TaskRoleArn:
    Type: String
    Default: ''
    Description: >
      Pre-existing ECS task role ARN (sandbox/prod only).
      Leave empty in dev - the role will be created by this template.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project Configuration
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: Network Configuration
        Parameters:
          - PrivateSubnetIds
          - ArangoDbSecurityGroupId
          - EfsSecurityGroupId
      - Label:
          default: ECS Configuration
        Parameters:
          - EcsClusterName
          - ServiceDiscoveryNamespaceId
          - TargetGroupArn
      - Label:
          default: ArangoDB Configuration
        Parameters:
          - ArangoDbS3BucketName
          - ArangoDbUser
          - ArangoDbPassword
      - Label:
          default: Pre-existing IAM Roles (sandbox/prod only - leave empty in dev)
        Parameters:
          - TaskExecutionRoleArn
          - TaskRoleArn

Conditions:
  HasMultiplePrivateSubnets: !Equals [!Ref PrivateSubnetCount, 2]
  # IAM roles are created only in dev; sandbox/prod use pre-existing roles
  IsDev: !Equals [!Ref Environment, 'dev']

Resources:
  # ============================================================================
  # EFS File System for ArangoDB Data
  # ============================================================================
  ArangoDbFileSystem:
    Type: AWS::EFS::FileSystem
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      # No lifecycle policy - ArangoDB actively accesses data files
      # IA storage class has higher latency unsuitable for databases
      FileSystemTags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-arangodb-efs'
        - Key: ManagedBy
          Value: CloudFormation

  # EFS Mount Targets (one per private subnet)
  EfsMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref ArangoDbFileSystem
      SubnetId: !Select [0, !Ref PrivateSubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroupId

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    Condition: HasMultiplePrivateSubnets
    Properties:
      FileSystemId: !Ref ArangoDbFileSystem
      SubnetId: !Select [1, !Ref PrivateSubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroupId

  # EFS Access Point
  ArangoDbAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref ArangoDbFileSystem
      PosixUser:
        Uid: '1000'
        Gid: '1000'
      RootDirectory:
        Path: /arangodb
        CreationInfo:
          OwnerUid: '1000'
          OwnerGid: '1000'
          Permissions: '755'
      AccessPointTags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-arangodb-ap'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # SSM Parameters for ArangoDB Credentials
  # ============================================================================
  ArangoDbUserParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/arango/db-user'
      Type: String
      Value: !Ref ArangoDbUser
      Description: ArangoDB username
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Name: !Sub '${ProjectName}-${Environment}-arango-user'
        ManagedBy: CloudFormation

  ArangoDbPasswordParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/arango/db-password'
      Type: String
      Value: !Ref ArangoDbPassword
      Description: ArangoDB password
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Name: !Sub '${ProjectName}-${Environment}-arango-password'
        ManagedBy: CloudFormation

  # Dataset version parameter - managed out-of-band by deploy-dataset.sh.
  # Always set to 'none' here so CloudFormation never overwrites a live value
  # on subsequent stack updates, preventing unintended dataset restores.
  DatasetVersionParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/arango/dataset-version'
      Type: String
      Value: 'none'
      Description: Current dataset version (S3 key) - updated by deploy-dataset.sh, not CloudFormation
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Name: !Sub '${ProjectName}-${Environment}-dataset-version'
        ManagedBy: CloudFormation

  # ============================================================================
  # IAM Roles for ECS Tasks (dev only)
  # In sandbox/prod these roles are pre-created and passed in as parameters.
  # ============================================================================
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Condition: IsDev
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-arangodb-exec'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Policies:
        - PolicyName: SSMAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-arangodb-exec-role'
        - Key: ManagedBy
          Value: CloudFormation

  TaskRole:
    Type: AWS::IAM::Role
    Condition: IsDev
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-arangodb-task'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${ArangoDbS3BucketName}'
                  - !Sub 'arn:${AWS::Partition}:s3:::${ArangoDbS3BucketName}/*'
        - PolicyName: SSMAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/arango/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-arangodb-task-role'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # CloudWatch Log Group
  # ============================================================================
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}-${Environment}-arangodb'
      RetentionInDays: 7

  # ============================================================================
  # ECS Task Definition
  # ============================================================================
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Metadata:
      cfn-lint:
        config:
          ignore_checks:
            - W1030  # TaskExecutionRoleArn is intentionally empty in dev (conditional)
    Properties:
      Family: !Sub '${ProjectName}-${Environment}-arangodb'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '1024'
      Memory: '2048'
      # In dev use the roles created above; in sandbox/prod use the pre-existing ARNs
      ExecutionRoleArn: !If [IsDev, !GetAtt TaskExecutionRole.Arn, !Ref TaskExecutionRoleArn]
      TaskRoleArn: !If [IsDev, !GetAtt TaskRole.Arn, !Ref TaskRoleArn]
      Volumes:
        - Name: arangodb-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref ArangoDbFileSystem
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref ArangoDbAccessPoint
              IAM: ENABLED
      ContainerDefinitions:
        # Init container for S3 restore
        - Name: s3-restore
          Image: amazon/aws-cli:latest
          Essential: false
          Command:
            - sh
            - -c
            - !Sub |
              set -e
              echo "==> S3 Restore Init Container"

              PROJECT_NAME="${ProjectName}"
              ENVIRONMENT="${Environment}"
              ARANGODB_S3_BUCKET="${ArangoDbS3BucketName}"

              # Get current dataset version from SSM
              CURRENT_VERSION=$(aws ssm get-parameter \
                --name "/$PROJECT_NAME/$ENVIRONMENT/arango/dataset-version" \
                --query 'Parameter.Value' \
                --output text \
                --region ${AWS::Region})

              echo "Current dataset version: $CURRENT_VERSION"

              # Check last restored version
              LAST_RESTORED=$(cat /var/lib/arangodb3/.dataset-version 2>/dev/null || echo "none")
              echo "Last restored version: $LAST_RESTORED"

              # Only restore if version changed
              if [ "$CURRENT_VERSION" = "$LAST_RESTORED" ]; then
                echo "Already on version $CURRENT_VERSION, skipping restore"
                exit 0
              fi

              if [ "$CURRENT_VERSION" = "none" ] || [ -z "$CURRENT_VERSION" ]; then
                echo "No dataset version specified, skipping restore"
                exit 0
              fi

              echo "Version changed, restoring dataset..."

              # Clear existing data
              echo "Clearing old data..."
              rm -rf /var/lib/arangodb3/*
              rm -rf /var/lib/arangodb3-apps/*

              # Download and restore
              echo "Downloading s3://$ARANGODB_S3_BUCKET/$CURRENT_VERSION"
              aws s3 cp "s3://$ARANGODB_S3_BUCKET/$CURRENT_VERSION" /tmp/restore.tar.gz

              echo "Extracting backup..."
              tar -xzf /tmp/restore.tar.gz -C /

              # Save version marker
              echo "$CURRENT_VERSION" > /var/lib/arangodb3/.dataset-version

              echo "Restore completed successfully"
          MountPoints:
            - SourceVolume: arangodb-data
              ContainerPath: /var/lib/arangodb3
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: init

        # Main ArangoDB container
        - Name: arangodb
          Image: arangodb:3.12
          Essential: true
          DependsOn:
            - ContainerName: s3-restore
              Condition: SUCCESS
          PortMappings:
            - ContainerPort: 8529
              Protocol: tcp
          Secrets:
            - Name: ARANGO_ROOT_PASSWORD
              ValueFrom: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/arango/db-password'
          MountPoints:
            - SourceVolume: arangodb-data
              ContainerPath: /var/lib/arangodb3
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: arangodb
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-arangodb-task'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # Cloud Map Service for Service Discovery
  # ============================================================================
  ServiceDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: arangodb
      DnsConfig:
        NamespaceId: !Ref ServiceDiscoveryNamespaceId
        DnsRecords:
          - Type: A
            TTL: 60
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ============================================================================
  # ECS Service
  # ============================================================================
  EcsService:
    Type: AWS::ECS::Service
    DependsOn:
      - EfsMountTarget1
    Properties:
      ServiceName: !Sub '${ProjectName}-${Environment}-arangodb'
      Cluster: !Ref EcsClusterName
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !If [IsDev, ENABLED, DISABLED]
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref ArangoDbSecurityGroupId
      LoadBalancers:
        - TargetGroupArn: !Ref TargetGroupArn
          ContainerName: arangodb
          ContainerPort: 8529
      ServiceRegistries:
        - RegistryArn: !GetAtt ServiceDiscoveryService.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-arangodb-service'
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  ServiceName:
    Description: ECS service name
    Value: !GetAtt EcsService.Name
    Export:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-service-name'

  FileSystemId:
    Description: EFS file system ID
    Value: !Ref ArangoDbFileSystem
    Export:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-efs-id'

  ServiceDiscoveryDnsName:
    Description: Service discovery DNS name
    Value: !Sub 'arangodb.${ProjectName}-${Environment}.local'
    Export:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-dns'

  DatasetVersionParameter:
    Description: SSM parameter name for dataset version
    Value: !Ref DatasetVersionParameter
    Export:
      Name: !Sub '${ProjectName}-${Environment}-dataset-version-param'
