AWSTemplateFormatVersion: '2010-09-09'
Description: 'Application Load Balancer for Cell-KN'

Parameters:
  ProjectName:
    Type: String
    Default: cell-kn
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: dev
    Description: Environment name (dev, sandbox, prod)
    AllowedValues:
      - dev
      - sandbox
      - prod

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID (NIH-provided)

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnet IDs for ALB (NIH-provided)

  AlbSecurityGroupId:
    Type: String
    Description: Security group ID for ALB

  CloudFrontSecret:
    Type: String
    NoEcho: true
    Description: >
      Secret header value set by CloudFront on all origin requests
      (X-Custom-Origin-Header). Requests missing this header are rejected
      with 403, preventing direct ALB access that bypasses CloudFront.

  DomainName:
    Type: String
    Description: Base domain name (e.g., cell-kn-mvp.org)

  HostedZoneId:
    Type: String
    Description: Route 53 hosted zone ID for DNS validation of the ALB ACM certificate

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project Configuration
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: Network Configuration
        Parameters:
          - VpcId
          - PublicSubnetIds
          - AlbSecurityGroupId
      - Label:
          default: Domain Configuration
        Parameters:
          - DomainName
          - HostedZoneId
      - Label:
          default: Security
        Parameters:
          - CloudFrontSecret

Conditions:
  IsProd: !Equals [!Ref Environment, 'prod']

Resources:
  # ============================================================================
  # ACM Certificate
  #
  # Single certificate shared by both ALB HTTPS listeners (port 8000 and 8529)
  # and by CloudFront (passed as a parameter to frontend.yaml).
  # When the ALB is in us-east-1, this cert satisfies both requirements.
  # ============================================================================
  AlbCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !If
        - IsProd
        - !Ref DomainName
        - !Sub '${Environment}.${DomainName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !If
            - IsProd
            - !Ref DomainName
            - !Sub '${Environment}.${DomainName}'
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-alb-cert'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # S3 Bucket for ALB Access Logs
  # ============================================================================
  AlbLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: !If [IsProd, Retain, Delete]
    UpdateReplacePolicy: !If [IsProd, Retain, Delete]
    Properties:
      BucketName: !Sub '${ProjectName}-${Environment}-alb-logs-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-alb-logs-${AWS::AccountId}'
        - Key: ManagedBy
          Value: CloudFormation

  AlbLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AlbLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # ELB service account for the region — required for ALB access logs.
          # Account IDs are fixed per region: https://docs.aws.amazon.com/elasticloadbalancing/latest/application/enable-access-logging.html
          - Effect: Allow
            Principal:
              AWS: arn:aws:iam::127311923021:root
            Action: s3:PutObject
            Resource: !Sub '${AlbLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*'

  # ============================================================================
  # Application Load Balancer
  # ============================================================================
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-alb'
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroupId
      LoadBalancerAttributes:
        - Key: access_logs.s3.enabled
          Value: 'true'
        - Key: access_logs.s3.bucket
          Value: !Ref AlbLogsBucket
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-alb'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # Target Groups
  # ============================================================================
  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-backend-tg'
      Port: 8000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health/
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200-399
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-backend-tg'
        - Key: ManagedBy
          Value: CloudFormation

  ArangoDbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-tg'
      Port: 8529
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /_admin/server/availability
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200-399
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-arangodb-tg'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # ALB Listeners
  #
  # All listeners enforce the CloudFront origin secret header. Requests that
  # arrive without the correct X-Custom-Origin-Header value are rejected with
  # 403, preventing direct ALB access that bypasses CloudFront (and its TLS,
  # caching, and WAF protections).
  #
  # Rule evaluation order (priority lowest = evaluated first):
  #   Priority 1: header present and correct → forward to target group
  #   Default:    everything else → 403 Forbidden
  # ============================================================================

  # Port 80 — redirect to HTTPS hint; kept for health checks from AWS services
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '403'
            ContentType: text/plain
            MessageBody: Forbidden

  # Port 8000 — Backend API (CloudFront → ALB → ECS backend)
  BackendHttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 8000
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref AlbCertificate
      # Default action: reject anything that didn't match the header rule
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '403'
            ContentType: text/plain
            MessageBody: Forbidden

  BackendHeaderRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref BackendHttpListener
      Priority: 1
      Conditions:
        - Field: http-header
          HttpHeaderConfig:
            HttpHeaderName: X-Custom-Origin-Header
            Values:
              - !Ref CloudFrontSecret
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # Port 8529 — ArangoDB web UI and API (CloudFront → ALB → ECS arangodb)
  ArangoDbHttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 8529
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref AlbCertificate
      # Default action: reject anything that didn't match the header rule
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '403'
            ContentType: text/plain
            MessageBody: Forbidden

  ArangoDbHeaderRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ArangoDbHttpListener
      Priority: 1
      Conditions:
        - Field: http-header
          HttpHeaderConfig:
            HttpHeaderName: X-Custom-Origin-Header
            Values:
              - !Ref CloudFrontSecret
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ArangoDbTargetGroup

Outputs:
  CertificateArn:
    Description: ACM certificate ARN (shared with CloudFront via frontend.yaml)
    Value: !Ref AlbCertificate
    Export:
      Name: !Sub '${ProjectName}-${Environment}-acm-cert-arn'

  LoadBalancerArn:
    Description: ALB ARN
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub '${ProjectName}-${Environment}-alb-arn'

  LoadBalancerDnsName:
    Description: ALB DNS name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-alb-dns'

  LoadBalancerFullName:
    Description: ALB full name (for metrics)
    Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-alb-full-name'

  BackendTargetGroupArn:
    Description: Backend target group ARN
    Value: !Ref BackendTargetGroup
    Export:
      Name: !Sub '${ProjectName}-${Environment}-backend-tg-arn'

  ArangoDbTargetGroupArn:
    Description: ArangoDB target group ARN
    Value: !Ref ArangoDbTargetGroup
    Export:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-tg-arn'

  BackendUrl:
    Description: Backend API URL
    Value: !Sub 'https://${ApplicationLoadBalancer.DNSName}:8000'
    Export:
      Name: !Sub '${ProjectName}-${Environment}-backend-url'

  ArangoDbUrl:
    Description: ArangoDB web UI URL
    Value: !Sub 'https://${ApplicationLoadBalancer.DNSName}:8529'
    Export:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-url'
