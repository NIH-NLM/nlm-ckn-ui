AWSTemplateFormatVersion: '2010-09-09'
Description: 'Backend ECS service with auto-scaling (2-10 tasks)'

Parameters:
  ProjectName:
    Type: String
    Default: cell-kn
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: dev
    Description: Environment name (dev, sandbox, prod)
    AllowedValues:
      - dev
      - sandbox
      - prod

  # Security group ID cannot use Fn::ImportValue inside Fn::If, so it is
  # passed as a parameter. deploy-environment.sh resolves it from either the
  # infra stack exports (dev) or SSM prereqs (sandbox/prod).
  BackendSecurityGroupId:
    Type: String
    Description: Security group ID for backend ECS tasks

  # IAM role ARNs - empty string in dev (roles are created by this template).
  # In sandbox/prod these must be pre-created ARNs passed in from deploy script,
  # which resolves them from SSM prereq parameters.
  TaskExecutionRoleArn:
    Type: String
    Default: ''
    AllowedPattern: '^(arn:(aws[a-zA-Z-]*)?:iam::\d{12}:role/[a-zA-Z_0-9+=,.@\-_/]+)?$'
    Description: >
      Pre-existing ECS task execution role ARN (sandbox/prod only).
      Leave empty in dev - the role will be created by this template.

  TaskRoleArn:
    Type: String
    Default: ''
    Description: >
      Pre-existing ECS task role ARN (sandbox/prod only).
      Leave empty in dev - the role will be created by this template.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project Configuration
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: Network Configuration (security group only - subnets from infra stack exports)
        Parameters:
          - BackendSecurityGroupId
      - Label:
          default: Pre-existing IAM Roles (sandbox/prod only - leave empty in dev)
        Parameters:
          - TaskExecutionRoleArn
          - TaskRoleArn

Conditions:
  IsProd: !Equals [!Ref Environment, 'prod']
  # IAM roles are created only in dev; sandbox/prod use pre-existing roles
  IsDev: !Equals [!Ref Environment, 'dev']

Resources:
  # ============================================================================
  # SSM Parameters for Django Configuration
  # ============================================================================
  DjangoSecretKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/django/secret-key'
      Type: String
      # Read from the secrets stack SSM path (written before this stack deploys)
      Value: !Sub '{{resolve:ssm:/${ProjectName}/${Environment}/secrets/django-secret-key}}'
      Description: Django secret key (mirrored from secrets stack SSM path)
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Name: !Sub '${ProjectName}-${Environment}-django-secret'
        ManagedBy: CloudFormation

  # Auto-calculated Django settings
  DjangoAllowedHostsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/django/allowed-hosts'
      Type: String
      Value: !If
        - IsDev
        - 'localhost,*'
        - !Sub
          - 'localhost,${FullDomain}'
          - FullDomain: !If
              - IsProd
              - !ImportValue
                  Fn::Sub: '${ProjectName}-${Environment}-domain-name'
              - !Sub
                - '${Environment}.${Domain}'
                - Domain: !ImportValue
                    Fn::Sub: '${ProjectName}-${Environment}-domain-name'
      Description: Django ALLOWED_HOSTS (auto-calculated)
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Name: !Sub '${ProjectName}-${Environment}-django-hosts'
        ManagedBy: CloudFormation

  DjangoCorsOriginsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/django/cors-origins'
      Type: String
      Value: !Sub
        - 'https://${FullDomain}'
        - FullDomain: !If
            - IsProd
            - !ImportValue
                Fn::Sub: '${ProjectName}-${Environment}-domain-name'
            - !Sub
              - '${Environment}.${Domain}'
              - Domain: !ImportValue
                  Fn::Sub: '${ProjectName}-${Environment}-domain-name'
      Description: Django CORS_ALLOWED_ORIGINS (auto-calculated)
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Name: !Sub '${ProjectName}-${Environment}-django-cors'
        ManagedBy: CloudFormation

  # ============================================================================
  # IAM Roles for ECS Tasks (dev only)
  # In sandbox/prod these roles are pre-created and passed in as parameters.
  # ============================================================================
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Condition: IsDev
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-backend-exec'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Policies:
        - PolicyName: SSMAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-backend-exec-role'
        - Key: ManagedBy
          Value: CloudFormation

  TaskRole:
    Type: AWS::IAM::Role
    Condition: IsDev
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-backend-task'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-backend-task-role'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # CloudWatch Log Group
  # ============================================================================
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}-${Environment}-backend'
      RetentionInDays: 7

  # ============================================================================
  # ECS Task Definition
  # ============================================================================
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Metadata:
      cfn-lint:
        config:
          ignore_checks:
            - W1030  # TaskExecutionRoleArn is intentionally empty in dev (conditional)
    Properties:
      Family: !Sub '${ProjectName}-${Environment}-backend'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      # In dev use the roles created above; in sandbox/prod use the pre-existing ARNs
      ExecutionRoleArn: !If [IsDev, !GetAtt TaskExecutionRole.Arn, !Ref TaskExecutionRoleArn]
      TaskRoleArn: !If [IsDev, !GetAtt TaskRole.Arn, !Ref TaskRoleArn]
      ContainerDefinitions:
        - Name: backend
          # Placeholder image used only on first stack deployment.
          # All subsequent image updates are managed exclusively by deploy-backend.sh,
          # which registers new task definition revisions with the git SHA image tag.
          # Re-running this CloudFormation stack will NOT change the running image.
          Image: !Sub '{{resolve:ssm:/${ProjectName}/shared/ecr-url}}:latest'
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - Name: ARANGO_DB_HOST
              Value: !Sub
                - 'http://${ArangoHost}:8529'
                - ArangoHost: !ImportValue
                    Fn::Sub: '${ProjectName}-${Environment}-arangodb-dns'
            - Name: ARANGO_DB_NAME_ONTOLOGIES
              Value: Cell-KN-Ontologies
            - Name: ARANGO_DB_NAME_PHENOTYPES
              Value: Cell-KN-Phenotypes
            - Name: GRAPH_NAME_ONTOLOGIES
              Value: KN-Ontologies-v2.0
            - Name: GRAPH_NAME_PHENOTYPES
              Value: KN-Phenotypes-v2.0
          Secrets:
            - Name: SECRET_KEY
              ValueFrom: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/django/secret-key'
            - Name: ALLOWED_HOSTS
              ValueFrom: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/django/allowed-hosts'
            - Name: CORS_ALLOWED_ORIGINS
              ValueFrom: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/django/cors-origins'
            - Name: ARANGO_DB_USER
              ValueFrom: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/arango/db-user'
            - Name: ARANGO_DB_PASSWORD
              ValueFrom: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/arango/db-password'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-backend-task'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # ECS Service
  # ============================================================================
  EcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub '${ProjectName}-${Environment}-backend'
      Cluster: !ImportValue
        Fn::Sub: '${ProjectName}-${Environment}-cluster-name'
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: 0
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !If [IsDev, ENABLED, DISABLED]
          Subnets: !Split
            - ','
            - !ImportValue
                Fn::Sub: '${ProjectName}-${Environment}-private-subnet-ids'
          SecurityGroups:
            - !Ref BackendSecurityGroupId
      LoadBalancers:
        - TargetGroupArn: !ImportValue
            Fn::Sub: '${ProjectName}-${Environment}-backend-tg-arn'
          ContainerName: backend
          ContainerPort: 8000
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-backend-service'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # Application Auto Scaling
  # ============================================================================
  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      ServiceNamespace: ecs
      ResourceId: !Sub
        - 'service/${ClusterName}/${EcsService.Name}'
        - ClusterName: !ImportValue
            Fn::Sub: '${ProjectName}-${Environment}-cluster-name'
      ScalableDimension: ecs:service:DesiredCount
      MinCapacity: 2
      MaxCapacity: 10
      RoleARN: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService'

  # CPU-based scaling policy
  ScalingPolicyCpu:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub '${ProjectName}-${Environment}-backend-cpu-scaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # Memory-based scaling policy
  ScalingPolicyMemory:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub '${ProjectName}-${Environment}-backend-memory-scaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 80.0
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Outputs:
  ServiceName:
    Description: ECS service name
    Value: !GetAtt EcsService.Name
    Export:
      Name: !Sub '${ProjectName}-${Environment}-backend-service-name'

  TaskDefinitionArn:
    Description: Task definition ARN (baseline only - updated by deploy-backend.sh)
    Value: !Ref TaskDefinition
    Export:
      Name: !Sub '${ProjectName}-${Environment}-backend-task-arn'

  BackendImageTagParameter:
    Description: SSM parameter name for the active backend image tag (set by deploy-backend.sh)
    Value: !Sub '/${ProjectName}/${Environment}/backend/image-tag'
