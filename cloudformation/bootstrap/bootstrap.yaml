AWSTemplateFormatVersion: '2010-09-09'
Description: 'Bootstrap infrastructure for Cell-KN - S3 for templates, OIDC provider, and IAM roles'

Parameters:
  ProjectName:
    Type: String
    Default: cell-kn
    Description: Project name for resource naming

  GitHubOrg:
    Type: String
    Description: GitHub organization name
    Default: NIH-NLM

  GitHubRepo:
    Type: String
    Description: GitHub repository name
    Default: cell-kn-mvp-ui

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project Configuration
        Parameters:
          - ProjectName
      - Label:
          default: GitHub Configuration
        Parameters:
          - GitHubOrg
          - GitHubRepo

Resources:
  # ============================================================================
  # S3 Bucket for CloudFormation Templates
  # ============================================================================
  TemplatesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${ProjectName}-cfn-templates'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Name
          Value: !Sub '${ProjectName}-cfn-templates'
        - Key: Purpose
          Value: CloudFormation template storage
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # S3 Bucket for Stack Outputs and State
  # ============================================================================
  # This replaces Terraform state - used to store stack outputs and deployment metadata
  StateBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${ProjectName}-cfn-state'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: STANDARD_IA
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Name
          Value: !Sub '${ProjectName}-cfn-state'
        - Key: Purpose
          Value: CloudFormation state and outputs
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # GitHub OIDC Provider
  # ============================================================================
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        # GitHub's OIDC thumbprint (as of 2024)
        - 6938fd4d98bab03faadb97b34396831e3780aea1
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Name
          Value: !Sub '${ProjectName}-github-oidc'
        - Key: Purpose
          Value: GitHub Actions OIDC authentication
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # IAM Role for GitHub Actions
  # ============================================================================
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-github-actions'
      Description: Role for GitHub Actions to deploy infrastructure
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOIDCProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                'token.actions.githubusercontent.com:sub': !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
              StringEquals:
                'token.actions.githubusercontent.com:aud': sts.amazonaws.com
      Policies:
        - PolicyName: CellKnDeploymentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudFormation management
              - Effect: Allow
                Action:
                  - cloudformation:*
                Resource: '*'
              # S3 for templates, frontend, datasets
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-*'
                  - !Sub 'arn:${AWS::Partition}:s3:::${ProjectName}-*/*'
              # ECR for Docker images
              - Effect: Allow
                Action:
                  - ecr:*
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ecr:*:${AWS::AccountId}:repository/${ProjectName}-*'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              # ECS for services and tasks
              - Effect: Allow
                Action:
                  - ecs:*
                Resource: '*'
              # IAM for service roles
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:PassRole
                Resource:
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-*'
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: '*'
              # EC2 for security groups
              - Effect: Allow
                Action:
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:AuthorizeSecurityGroup*
                  - ec2:RevokeSecurityGroup*
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSecurityGroupRules
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: '*'
              # ELB for ALB
              - Effect: Allow
                Action:
                  - elasticloadbalancing:*
                Resource: '*'
              # CloudFront
              - Effect: Allow
                Action:
                  - cloudfront:*
                Resource: '*'
              # Route 53
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                  - route53:GetChange
                Resource: '*'
              # ACM for certificates
              - Effect: Allow
                Action:
                  - acm:*
                Resource: '*'
              # SSM Parameter Store
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:DeleteParameter
                  - ssm:AddTagsToResource
                  - ssm:ListTagsForResource
                  - ssm:RemoveTagsFromResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:*:${AWS::AccountId}:parameter/${ProjectName}/*'
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                  - logs:DescribeLogGroups
                  - logs:ListTagsForResource
                Resource: '*'
              # Lambda for custom resources
              - Effect: Allow
                Action:
                  - lambda:*
                Resource:
                  - !Sub 'arn:${AWS::Partition}:lambda:*:${AWS::AccountId}:function:${ProjectName}-*'
              # EFS
              - Effect: Allow
                Action:
                  - elasticfilesystem:*
                Resource: '*'
              # Service Discovery (Cloud Map)
              - Effect: Allow
                Action:
                  - servicediscovery:*
                Resource: '*'
              # Application Auto Scaling
              - Effect: Allow
                Action:
                  - application-autoscaling:*
                Resource: '*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Name
          Value: !Sub '${ProjectName}-github-actions'
        - Key: Purpose
          Value: GitHub Actions deployment role
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  TemplatesBucketName:
    Description: S3 bucket for CloudFormation templates
    Value: !Ref TemplatesBucket
    Export:
      Name: !Sub '${ProjectName}-templates-bucket'

  StateBucketName:
    Description: S3 bucket for stack outputs and state
    Value: !Ref StateBucket
    Export:
      Name: !Sub '${ProjectName}-state-bucket'


  GitHubOIDCProviderArn:
    Description: GitHub OIDC Provider ARN
    Value: !GetAtt GitHubOIDCProvider.Arn
    Export:
      Name: !Sub '${ProjectName}-github-oidc-arn'

  GitHubActionsRoleArn:
    Description: IAM Role ARN for GitHub Actions
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: !Sub '${ProjectName}-github-actions-role-arn'

  GitHubActionsRoleName:
    Description: IAM Role name for GitHub Actions
    Value: !Ref GitHubActionsRole

  DeploymentInstructions:
    Description: Next steps for deployment
    Value: !Sub |
      Bootstrap complete! Next steps:
      1. Upload environment templates to S3: aws s3 sync cloudformation/ s3://${TemplatesBucket}/
      2. Configure GitHub Actions to use role: ${GitHubActionsRole.Arn}
      3. Deploy shared resources: aws cloudformation deploy --template-file cloudformation/shared/shared-resources.yaml --stack-name ${ProjectName}-shared
      4. Deploy environment: See cloudformation/DEPLOYMENT.md
